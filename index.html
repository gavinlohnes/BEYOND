<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BEYOND.OS – Redline</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div class="bg"></div>

    <div class="core">
      <div class="core-inner"></div>
    </div>

    <div class="beam"></div>

    <div class="ripples">
      <div class="ripple ripple-1"></div>
      <div class="ripple ripple-2"></div>
      <div class="ripple ripple-3"></div>
    </div>

    <div class="diamonds">
      <div class="diamond diamond-1"></div>
      <div class="diamond diamond-2"></div>
      <div class="diamond diamond-3"></div>
    </div>

    <div class="hud">
      <div class="hud-line">BEYOND.OS // REDLINE CONTINUUM</div>
      <div class="hud-line" id="hud-identity">IDENTITY: —</div>
      <div class="hud-line" id="hud-presence">PRESENCE: —</div>
      <div class="hud-line" id="hud-stability">STABILITY: —</div>
      <div class="hud-line" id="hud-drift">DRIFT: —</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
