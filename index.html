<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEYOND OS V6</title>
    <link rel="stylesheet" href="style.css">
</head>

<body data-theme="default" data-animations="on">

<!-- =========================
     NAVIGATION DRAWER
========================= -->
<div id="navDrawer" class="nav-drawer nav-drawer--hidden">
    <button id="navToggleBtn" class="nav-toggle-btn">≡</button>
    <div class="nav-drawer-inner">
        <button id="navTodayBtn" class="nav-item">TODAY</button>
        <button id="navWeeklyBtn" class="nav-item">WEEKLY</button>
        <button id="navSettingsBtn" class="nav-item">SETTINGS</button>
    </div>
</div>

<!-- =========================
     TODAY SCREEN
========================= -->
<section id="todayScreen" class="screen screen-active" data-density="standard">
    <h1>BEYOND OS</h1>

    <div class="today-actions">
        <button class="primary-btn" onclick="updateHydration(8)">+8oz Water</button>
        <button class="primary-btn" onclick="updateProtein(20)">+20g Protein</button>
        <button class="primary-btn" onclick="updateCalories(250)">+250 Calories</button>
        <button class="primary-btn" onclick="toggleTrainingSession()">TRAIN</button>
        <button id="quickAddOpenBtn" class="secondary-btn">QUICK ADD</button>
    </div>

    <div id="readinessPanel" class="panel">
        <div class="panel-title">READINESS</div>
        <div id="readinessScore" class="readiness-score">0</div>
        <div class="readiness-bar">
            <div id="readinessBarFill" class="readiness-bar-fill"></div>
        </div>
    </div>

    <div id="recommendationsPanel" class="panel">
        <div class="panel-title">RECOMMENDATIONS</div>
        <div id="recList" class="rec-list"></div>
    </div>

    <div id="missionPanel" class="panel">
        <div class="panel-title">MISSIONS</div>
        <div id="missionList"></div>
    </div>

    <div id="alertsPanel" class="panel">
        <div class="panel-title">ALERTS</div>
        <div id="alertsList"></div>
    </div>
</section>

<!-- =========================
     SETTINGS SCREEN
========================= -->
<section id="settingsScreen" class="screen">

    <div class="topbar">
        <button id="settingsBackBtn" class="topbar-back">BACK</button>
        <h2>SYSTEM SETTINGS</h2>
    </div>

    <div class="settings-grid">

        <div class="settings-card">
            <div class="settings-label">THEME</div>
            <select id="themeSelector">
                <option value="default">DEFAULT</option>
                <option value="stealth">STEALTH</option>
                <option value="alert">ALERT</option>
                <option value="overdrive">OVERDRIVE</option>
            </select>
        </div>

        <div class="settings-card">
            <div class="settings-label">HUD DENSITY</div>
            <select id="hudDensitySelector">
                <option value="compact">COMPACT</option>
                <option value="standard" selected>STANDARD</option>
                <option value="expanded">EXPANDED</option>
            </select>
        </div>

        <div class="settings-card">
            <div class="settings-label">PLAYBOOK</div>
            <select id="playbookSelector">
                <option value="CUT">CUT</option>
                <option value="MAINTAIN">MAINTAIN</option>
                <option value="BULK">BULK</option>
                <option value="RECOVERY">RECOVERY</option>
            </select>
        </div>

        <div class="settings-card">
            <div class="settings-label">SCENARIO</div>
            <select id="scenarioSelector">
                <option value="">NONE</option>
                <option value="NIGHTSHIFT">NIGHT SHIFT</option>
                <option value="TRAVEL">TRAVEL</option>
                <option value="DELOAD">DELOAD</option>
            </select>
        </div>

        <div class="settings-card">
            <div class="settings-label">SYSTEM</div>
            <button id="animationToggle" class="settings-btn">TOGGLE ANIMATIONS</button>
            <button id="soundToggle" class="settings-btn">TOGGLE SOUND</button>
        </div>

        <div class="settings-card">
            <div class="settings-label">DATA</div>
            <button id="resetSystemBtn" class="settings-btn settings-btn-danger">RESET SYSTEM</button>
        </div>

    </div>
</section>

<!-- =========================
     WEEKLY SUMMARY SCREEN
========================= -->
<section id="weeklySummaryScreen" class="screen">

    <div class="topbar">
        <button id="weeklyBackBtn" class="topbar-back">BACK</button>
        <h2>WEEKLY SUMMARY</h2>
    </div>

    <div class="weekly-grid">
        <div>Consistency: <span id="weeklyConsistency"></span></div>
        <div>Calories: <span id="weeklyCalories"></span></div>
        <div>Protein: <span id="weeklyProtein"></span></div>
        <div>Hydration: <span id="weeklyHydration"></span></div>
        <div>Sleep: <span id="weeklySleep"></span></div>
        <div>Training: <span id="weeklyTraining"></span></div>
    </div>

    <div id="intelligencePanel" class="panel" style="margin-top:20px;">
        <div class="panel-title">INTELLIGENCE</div>

        <div class="panel-subtitle" style="font-size:12px; margin-top:10px;">STRENGTHS</div>
        <div id="intelStrengths"></div>

        <div class="panel-subtitle" style="font-size:12px; margin-top:10px;">WEAKNESSES</div>
        <div id="intelWeaknesses"></div>

        <div class="panel-subtitle" style="font-size:12px; margin-top:10px;">RECOMMENDATIONS</div>
        <div id="intelRecommendations"></div>

        <div class="panel-subtitle" style="font-size:12px; margin-top:10px;">NEXT WEEK FOCUS</div>
        <div id="intelNextWeek"></div>
    </div>

</section>

<!-- =========================
     QUICK ADD PANEL
========================= -->
<div id="quickAddOverlay" class="quick-overlay"></div>

<div id="quickAddPanel" class="quick-panel">
    <div class="quick-header">
        <span>QUICK ADD</span>
        <button id="quickAddCloseBtn" class="quick-close">✕</button>
    </div>
    <div class="quick-grid">
        <button class="quick-btn" data-action="hydration">+8oz Water</button>
        <button class="quick-btn" data-action="protein">+20g Protein</button>
        <button class="quick-btn" data-action="calories">+250 Calories</button>
        <button class="quick-btn" data-action="training">Log Training</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
