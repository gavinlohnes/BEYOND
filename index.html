<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BEYOND OS</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Boot Screen -->
<div id="bootScreen">
  <div id="bootLogo">BEYOND</div>
  <div id="bootSub">INITIALIZING SUIT INTERFACE...</div>
</div>

<!-- HUD Layers -->
<div id="hudParticles"></div>
<div id="hudObjects"></div>
<div id="hudSweep"></div>

<!-- Main App -->
<div id="app" class="screen-active">

  <div id="topBar" class="panel panel-depth">
    <div class="panel-title">
      <span class="icon-3d"></span>
      BEYOND OS
    </div>
    <div class="topbar-status">
      <div class="status-pill">RDY: <span id="readinessValue">100</span>%</div>
      <div class="status-pill">SCN: <span id="scenarioValue">IDLE</span></div>
    </div>
  </div>

  <div id="mainGrid">

    <!-- Workout Panel -->
    <div id="workoutPanel" class="panel panel-depth">
      <div class="panel-title"><span class="icon-3d"></span>WORKOUT</div>
      <div class="glyph glyph-workout"></div>
      <div class="sigil"></div>
      <div class="panel-body">
        <div class="metric">
          <div class="metric-label">TODAY</div>
          <div class="metric-value" id="workoutToday">UPPER</div>
        </div>
        <div class="metric">
          <div class="metric-label">NEXT</div>
          <div class="metric-value" id="workoutNext">LOWER</div>
        </div>
        <button class="nav-button interactive hud-impact" data-nav="workout">ENTER WORKOUT MODE</button>
      </div>
    </div>

    <!-- Meals Panel -->
    <div id="mealsPanel" class="panel panel-depth">
      <div class="panel-title"><span class="icon-3d"></span>MEALS</div>
      <div class="glyph glyph-meals"></div>
      <div class="sigil"></div>
      <div class="panel-body">
        <div class="metric">
          <div class="metric-label">ANCHOR A</div>
          <div class="metric-value" id="mealA">BEEF + RICE</div>
        </div>
        <div class="metric">
          <div class="metric-label">ANCHOR B</div>
          <div class="metric-value" id="mealB">CHICKEN + PASTA</div>
        </div>
        <button class="nav-button interactive hud-impact" data-nav="meals">ENTER MEAL MODE</button>
      </div>
    </div>

    <!-- Grocery Panel -->
    <div id="groceryPanel" class="panel panel-depth">
      <div class="panel-title"><span class="icon-3d"></span>GROCERY</div>
      <div class="glyph glyph-grocery"></div>
      <div class="sigil"></div>
      <div class="panel-body">
        <div class="metric">
          <div class="metric-label">BUDGET</div>
          <div class="metric-value" id="budgetValue">$120</div>
        </div>
        <div class="metric">
          <div class="metric-label">ANCHOR COUNT</div>
          <div class="metric-value" id="anchorCount">2</div>
        </div>
        <button class="nav-button interactive hud-impact" data-nav="grocery">ENTER GROCERY MODE</button>
      </div>
    </div>

  </div>

  <!-- Theme Switcher -->
  <div id="themeSwitcher" class="panel">
    <div class="panel-title">THEME</div>
    <div class="theme-buttons">
      <button class="nav-button interactive" data-theme="nightops">Night Ops</button>
      <button class="nav-button interactive" data-theme="redline">Redline</button>
      <button class="nav-button interactive" data-theme="stealth">Stealth</button>
      <button class="nav-button interactive" data-theme="overclock">Overclock</button>
    </div>
  </div>

</div>

<!-- Audio -->
<audio id="sndNightOps"    src="" loop preload="auto"></audio>
<audio id="sndRedline"     src="" loop preload="auto"></audio>
<audio id="sndStealth"     src="" loop preload="auto"></audio>
<audio id="sndOverclock"   src="" loop preload="auto"></audio>
<audio id="sndToneUp"      src="" preload="auto"></audio>
<audio id="sndToneDown"    src="" preload="auto"></audio>
<audio id="sndScenario"    src="" preload="auto"></audio>

<script src="script.js"></script>
</body>
</html>
