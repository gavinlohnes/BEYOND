<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BEYOND‑OS REDX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- VISOR -->
    <div id="visor">
      <div id="visor-overlay"></div>
      <div id="visor-suit-state"></div>
      <div id="visor-priority"></div>
      <div id="visor-directive"></div>

      <div id="visor-timeline">
        <div id="visor-timeline-fill"></div>
      </div>

      <div id="visor-glyphs"></div>
    </div>

    <!-- CONTROL PANEL -->
    <div id="control-panel">
      <h1>BEYOND‑OS REDX</h1>

      <div class="section">
        <h2>Metrics</h2>
        <label>Protein <input id="input-protein" type="number" /></label>
        <label>Calories <input id="input-calories" type="number" /></label>
        <label>Sleep (hrs) <input id="input-sleep" type="number" step="0.1" /></label>
        <label>Hydration (L) <input id="input-hydration" type="number" step="0.1" /></label>
        <label>Steps <input id="input-steps" type="number" /></label>
      </div>

      <div class="section">
        <h2>Mission</h2>
        <select id="mission-select">
          <option value="BASELINE">Baseline</option>
          <option value="CUT">Cut</option>
          <option value="BULK">Bulk</option>
          <option value="RECOVERY">Recovery</option>
        </select>
      </div>

      <div class="section">
        <h2>System</h2>
        <button id="btn-sync">Sync REDX</button>
        <button id="btn-force-tick">Force Tick</button>

        <label class="toggle">
          <input id="toggle-animations" type="checkbox" checked />
          <span>Animations</span>
        </label>
      </div>

      <div class="section">
        <h2>Debug</h2>
        <pre id="debug-output"></pre>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
