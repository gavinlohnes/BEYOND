<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BEYOND‑OS REDX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- BEYOND‑OS REDX SPLASH -->
  <div id="os-splash">
    <div id="os-splash-text">/// BEYOND ONLINE</div>
  </div>

  <!-- OS FRAME -->
  <div id="os-frame">

    <!-- HEADER -->
    <header id="os-header">
      <div id="os-brand">BEYOND‑OS REDX</div>
      <div id="os-status">SYSTEM ARMED</div>
    </header>

    <!-- MAIN GRID -->
    <div id="os-main">

      <!-- VISOR -->
      <section class="os-panel" id="os-visor">
        <h2 class="panel-title">VISOR</h2>
        <div class="panel-body" id="visor-body">
          <p class="visor-line" id="visor-link">• LINK: ONLINE</p>
          <p class="visor-line" id="visor-mode">• MODE: REDX</p>
          <p class="visor-line" id="visor-signal">• SIGNAL: STABLE</p>
        </div>
      </section>

      <!-- TODAY -->
      <section class="os-panel" id="os-today">
        <h2 class="panel-title">TODAY</h2>
        <div class="panel-body" id="today-body">
          <p class="today-line" id="today-core">/// CORE SHELL ACTIVE</p>
          <p class="today-line" id="today-panels">/// PANELS STANDING BY</p>
          <p class="today-line" id="today-mission">/// READY FOR MODULES</p>
        </div>
      </section>

      <!-- SYSTEM LOG -->
      <section class="os-panel" id="os-system">
        <h2 class="panel-title">SYSTEM LOG</h2>
        <div class="panel-body" id="log-panel"></div>
      </section>

    </div>

    <!-- COMMAND BAR -->
    <footer id="os-command">
      <div id="command-label">COMMAND</div>
      <div id="command-line">awaiting input…</div>
    </footer>

  </div>

  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  </script>

</body>
</html>
