<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BEYOND-OS MAX V5.2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#020308">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="https://via.placeholder.com/192x192/ff1a3c/ffffff?text=BO" type="image/png">

  <link rel="stylesheet" href="css/styles.css" />

  <style>
    #boot-screen {
      transition: opacity .6s ease, transform .6s ease;
    }
    #boot-screen.hide {
      opacity: 0;
      transform: scale(1.02);
    }
  </style>
</head>

<body>

  <!-- BOOT -->
  <div id="boot-screen">
    <div class="h1">BEYOND-OS</div>
    <div class="p mono">V5.2 SYSTEM INITIALIZING</div>
    <div id="boot-progress">
      <div id="boot-progress-bar"></div>
    </div>
  </div>

  <div class="scanlines"></div>

  <!-- SYSTEM PANEL -->
  <div id="system-panel">
    <div class="system-panel-inner">
      <div class="system-panel-header">
        <span class="mono">SYSTEM PANEL</span>
        <button class="system-close" onclick="toggleSystemPanel(false)">✕</button>
      </div>
      <div class="system-panel-grid">
        <div class="system-item">
          <div class="label mono">VERSION</div>
          <div class="value mono">BEYOND-OS MAX V5.2</div>
        </div>
        <div class="system-item">
          <div class="label mono">UPTIME</div>
          <div class="value mono" id="uptime-readout">00:00:00</div>
        </div>
        <div class="system-item">
          <div class="label mono">THEME</div>
          <button class="chip" onclick="toggleTheme()">TOGGLE THEME</button>
        </div>
        <div class="system-item">
          <div class="label mono">SOUNDS</div>
          <button class="chip" onclick="toggleSounds()">TOGGLE SOUNDS</button>
        </div>
        <div class="system-item">
          <div class="label mono">SESSION</div>
          <button class="chip danger" onclick="resetOS()">RESET OS</button>
        </div>
      </div>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app-shell" style="display:none;opacity:0;transition:.4s ease;flex-direction:column;">

    <header class="card row header-card cinematic-in">
      <div class="stack" style="flex:1;">
        <div class="h2" id="app-title">HUD</div>
        <div class="hud-sub mono">
          <span id="hud-clock">00:00</span>
          <span id="hud-greeting">SYSTEM READY</span>
        </div>
      </div>
      <div class="hud-energy">
        <div class="hud-energy-label mono">ENERGY</div>
        <div class="hud-energy-bar">
          <div class="hud-energy-fill"></div>
        </div>
      </div>
      <button class="icon-button" onclick="toggleSystemPanel(true)" aria-label="System Panel">
        ☰
      </button>
    </header>

    <main id="app"></main>
  </div>

  <!-- NAVIGATION -->
  <nav id="bottom-nav">
    <div class="nav-bar">
      <button class="nav-button active" data-route="hud" onclick="navigate('hud')">HUD</button>
      <button class="nav-button" data-route="today" onclick="navigate('today')">Today</button>
      <button class="nav-button" data-route="nutrition" onclick="navigate('nutrition')">Fuel</button>
      <button class="nav-button" data-route="meals" onclick="navigate('meals')">Meals</button>
      <button class="nav-button" data-route="prep" onclick="navigate('prep')">Prep</button>
    </div>

    <div class="nav-row-secondary">
      <button class="nav-button" data-route="aldi" onclick="navigate('aldi')">Aldi</button>
      <button class="nav-button" data-route="walmart" onclick="navigate('walmart')">Walmart</button>
      <button class="nav-button" data-route="costco" onclick="navigate('costco')">Costco</button>
      <button class="nav-button" data-route="cycle" onclick="navigate('cycle')">Cycle</button>
      <button class="nav-button" data-route="loadout" onclick="navigate('loadout')">Loadout</button>
    </div>
  </nav>

  <!-- MODALS -->
  <div id="modal-backdrop" class="modal-backdrop" onclick="closeModal()"></div>

  <div id="modal-meal" class="modal">
    <div class="modal-inner">
      <div class="modal-header">
        <span class="mono">ADD MEAL</span>
        <button class="system-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <label class="mono">Name</label>
        <input id="meal-name" type="text" placeholder="Chicken & Rice">
        <label class="mono">Calories</label>
        <input id="meal-cal" type="number" placeholder="620">
        <label class="mono">Protein (g)</label>
        <input id="meal-protein" type="number" placeholder="45">
      </div>
      <div class="modal-footer">
        <button class="chip" onclick="closeModal()">CANCEL</button>
        <button class="chip primary" onclick="saveMeal()">SAVE</button>
      </div>
    </div>
  </div>

  <div id="modal-grocery" class="modal">
    <div class="modal-inner">
      <div class="modal-header">
        <span class="mono">ADD GROCERY ITEM</span>
        <button class="system-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <label class="mono">Item</label>
        <input id="grocery-item" type="text" placeholder="Eggs">
        <label class="mono">Store</label>
        <input id="grocery-store" type="text" placeholder="Aldi / Walmart / Costco">
      </div>
      <div class="modal-footer">
        <button class="chip" onclick="closeModal()">CANCEL</button>
        <button class="chip primary" onclick="saveGrocery()">SAVE</button>
      </div>
    </div>
  </div>

  <div id="modal-workout" class="modal">
    <div class="modal-inner">
      <div class="modal-header">
        <span class="mono">ADD WORKOUT</span>
        <button class="system-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <label class="mono">Movement</label>
        <input id="workout-move" type="text" placeholder="Bench Press">
        <label class="mono">Details</label>
        <input id="workout-notes" type="text" placeholder="185 x 5">
      </div>
      <div class="modal-footer">
        <button class="chip" onclick="closeModal()">CANCEL</button>
        <button class="chip primary" onclick="saveWorkout()">SAVE</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }

    window.addEventListener("load", () => {
      setTimeout(() => {
        const boot = document.getElementById("boot-screen");
        if (boot) boot.classList.add("hide");

        setTimeout(() => {
          if (boot) boot.style.display = "none";

          const shell = document.getElementById("app-shell");
          if (shell) {
            shell.style.display = "flex";
            shell.style.opacity = "1";
          }
          console.log("BEYOND-OS V5.2 ONLINE");
        }, 600);
      }, 900);
    });
  </script>

</body>
</html>
