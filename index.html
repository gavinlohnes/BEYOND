<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBOS Tactical HUD</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="hud-grid"></div>

  <header id="hud-header">
    <div class="hud-title">BBOS</div>
    <div class="hud-sub">Tactical HUD Interface</div>
  </header>

  <section id="hud-panel">
    <h2 class="panel-title">System Diagnostics</h2>

    <!-- NEW: Live OS status line -->
    <div id="os-status">OS Status: Initializing…</div>

    <button id="testBtn">Run System Check</button>
    <pre id="output"></pre>
  </section>

  <script src="app.js"></script>
</body>
</html>
