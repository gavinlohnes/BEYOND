<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BEYOND‑OS // V22</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <div class="brand">BEYOND‑OS<span class="tag">V22</span></div>
      <div class="status-pill" id="syncStatus">SHEETS: IDLE</div>
    </header>

    <main class="grid">
      <!-- LEFT: DAILY SNAPSHOT -->
      <section class="panel">
        <h2>Daily Snapshot</h2>

        <form id="dailyForm">
          <div class="field-row">
            <label>Calories</label>
            <input type="number" id="calories" required />
          </div>
          <div class="field-row">
            <label>Protein (g)</label>
            <input type="number" id="protein" required />
          </div>
          <div class="field-row">
            <label>Hydration (oz)</label>
            <input type="number" id="hydration" required />
          </div>
          <div class="field-row">
            <label>Sleep (hrs)</label>
            <input type="number" step="0.1" id="sleep" required />
          </div>

          <div class="field-row">
            <label>Readiness</label>
            <input type="text" id="readiness" placeholder="82%" />
          </div>
          <div class="field-row">
            <label>Threat</label>
            <input type="text" id="threat" placeholder="12%" />
          </div>
          <div class="field-row">
            <label>Stability</label>
            <input type="text" id="stability" placeholder="76%" />
          </div>

          <div class="field-row">
            <label>Scenario</label>
            <select id="scenario">
              <option value="IDLE">IDLE</option>
              <option value="ACTIVE">ACTIVE</option>
              <option value="OVERWATCH">OVERWATCH</option>
              <option value="RECOVERY">RECOVERY</option>
            </select>
          </div>

          <div class="field-row">
            <label>Mission</label>
            <select id="mission">
              <option value="NEUTRAL">NEUTRAL</option>
              <option value="ENGAGED">ENGAGED</option>
              <option value="AGGRESSIVE">AGGRESSIVE</option>
            </select>
          </div>

          <div class="field-row">
            <label>Emotional State</label>
            <select id="emotional">
              <option value="CALM">CALM</option>
              <option value="FOCUSED">FOCUSED</option>
              <option value="DRAINED">DRAINED</option>
              <option value="WIRED">WIRED</option>
            </select>
          </div>

          <button type="submit" class="primary-btn">LOG TO SHEETS</button>
        </form>

        <!-- ========================= -->
        <!-- NEW: BEYOND‑OS TACTICAL TILES -->
        <!-- ========================= -->

        <h2 style="margin-top: 2rem;">Operational Metrics</h2>

        <!-- WEIGHT TILE -->
        <div class="tile" id="tile-weight">
          <div class="tile-title">WEIGHT</div>
          <div class="tile-value" id="weight-current">--</div>
          <div class="tile-sub">
            Δ <span id="weight-delta">--</span> • 
            Avg <span id="weight-avg">--</span> • 
            <span id="weight-trend">■</span>
          </div>
        </div>

        <!-- COMPLIANCE TILE -->
        <div class="tile" id="tile-compliance">
          <div class="tile-title">COMPLIANCE</div>
          <div class="tile-value" id="comp-score">--</div>
          <div class="tile-sub">
            Flags: <span id="comp-flags">--</span> • 
            Readiness: <span id="comp-readiness">--</span>
          </div>
        </div>

        <!-- WEEKLY SUMMARY TILE -->
        <div class="tile" id="tile-weekly">
          <div class="tile-title">WEEKLY SUMMARY</div>
          <div class="tile-sub">Cal: <span id="week-cal">--</span></div>
          <div class="tile-sub">Pro: <span id="week-pro">--</span></div>
          <div class="tile-sub">Hyd: <span id="week-hyd">--</span></div>
          <div class="tile-sub">Sleep: <span id="week-sleep">--</span></div>
          <div class="tile-sub">Train: <span id="week-train">--</span></div>
          <div class="tile-sub">Ready: <span id="week-ready">--</span></div>
        </div>

      </section>

      <!-- RIGHT: SIGNALS / LAST 7 DAYS -->
      <section class="panel">
        <h2>Signals</h2>
        <div id="signalSummary" class="signal-block">
          <div class="signal-line">
            <span class="label">Scenario</span>
            <span id="signalScenario" class="value">IDLE</span>
          </div>
          <div class="signal-line">
            <span class="label">Mission</span>
            <span id="signalMission" class="value">NEUTRAL</span>
          </div>
          <div class="signal-line">
            <span class="label">Emotional</span>
            <span id="signalEmotional" class="value">CALM</span>
          </div>
        </div>

        <h3>Last 7 Logs (local)</h3>
        <ul id="last7List" class="log-list"></ul>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
