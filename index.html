<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BEYOND‑OS REDX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- BEYOND‑OS Splash -->
  <div id="os-splash">
    <div id="os-splash-text">/// BEYOND ONLINE</div>
  </div>

  <!-- OS FRAME -->
  <div id="os-frame">
    <header id="os-header">
      <div id="os-brand">BEYOND‑OS REDX</div>
      <div id="os-status">SYSTEM ARMED</div>
    </header>

    <div id="os-main">
      <!-- LEFT: VISOR / STATUS -->
      <section id="os-visor">
        <h2 class="panel-title">VISOR</h2>
        <div class="panel-body">
          <p class="visor-line">• LINK: ONLINE</p>
          <p class="visor-line">• MODE: REDX</p>
          <p class="visor-line">• SIGNAL: STABLE</p>
        </div>
      </section>

      <!-- CENTER: TODAY / PRIMARY PANEL -->
      <section id="os-today">
        <h2 class="panel-title">TODAY</h2>
        <div class="panel-body">
          <p class="today-line">/// CORE SHELL ACTIVE</p>
          <p class="today-line">/// PANELS STANDING BY</p>
          <p class="today-line">/// READY FOR MODULES</p>
        </div>
      </section>

      <!-- RIGHT: SYSTEM / LOG -->
      <section id="os-system">
        <h2 class="panel-title">SYSTEM LOG</h2>
        <div class="panel-body" id="log-panel">
          <!-- Filled by script.js -->
        </div>
      </section>
    </div>

    <!-- COMMAND BAR -->
    <footer id="os-command">
      <div id="command-label">COMMAND</div>
      <div id="command-line">awaiting input…</div>
    </footer>
  </div>

  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  </script>
</body>
</html>
