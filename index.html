<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BEYOND‑OS MAX V5.3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#020308">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="https://via.placeholder.com/192x192/ff1a3c/ffffff?text=BO" type="image/png">

  <!-- V5.3 Unified Stylesheet -->
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <!-- ============================================================
       BOOT SCREEN — V5.3 (Neon Core Pulse)
       ============================================================ -->
  <div id="boot-screen">
    <div class="boot-text glow-core">BEYOND‑OS MAX</div>
  </div>

  <!-- ============================================================
       SYSTEM PANEL — CLEAN V5.3 VERSION
       ============================================================ -->
  <div id="system-panel" class="panel" style="display:none;">
    <div class="panel-inner">
      <div class="hdr">
        <div class="hdr-logo">SYSTEM PANEL</div>
        <button class="btn-base" onclick="toggleSystemPanel(false)">✕</button>
      </div>

      <div class="section-divider"></div>

      <div class="panel">
        <div class="sys-status dim">VERSION</div>
        <div class="sys-status">BEYOND‑OS MAX V5.3</div>
      </div>

      <div class="panel">
        <div class="sys-status dim">UPTIME</div>
        <div class="sys-status" id="uptime-readout">00:00:00</div>
      </div>

      <div class="panel">
        <div class="sys-status dim">THEME</div>
        <button class="btn-base" onclick="toggleTheme()">TOGGLE THEME</button>
      </div>

      <div class="panel">
        <div class="sys-status dim">SOUNDS</div>
        <button class="btn-base" onclick="toggleSounds()">TOGGLE SOUNDS</button>
      </div>

      <div class="panel">
        <div class="sys-status dim">SESSION</div>
        <button class="btn-base" onclick="resetOS()">RESET OS</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       APP SHELL — HUD + MAIN APP CONTAINER
       ============================================================ -->
  <div id="app-shell" style="display:none;opacity:0;transition:.4s ease;flex-direction:column;">

    <header class="panel" style="padding:16px;">
      <div class="hdr-logo glow-faint">BEYOND‑OS HUD</div>
      <div class="sys-status" id="hud-clock">00:00</div>
      <div class="sys-status dim" id="hud-greeting">SYSTEM READY</div>

      <button class="btn-base" onclick="toggleSystemPanel(true)" style="position:absolute;top:16px;right:16px;">
        ☰
      </button>
    </header>

    <main id="app"></main>
  </div>
  <!-- ============================================================
         NAVIGATION — MINIMAL OS NAV + TOOLS TAB
         ============================================================ -->
    <nav id="bottom-nav" class="panel" style="padding:0;">
      <div class="chart-tabs">
        <button class="chart-tab on" data-route="hud" onclick="navigate('hud')">HUD</button>
        <button class="chart-tab" data-route="today" onclick="navigate('today')">Today</button>
        <button class="chart-tab" data-route="nutrition" onclick="navigate('nutrition')">Fuel</button>
        <button class="chart-tab" data-route="meals" onclick="navigate('meals')">Meals</button>
        <button class="chart-tab" data-route="prep" onclick="navigate('prep')">Prep</button>
        <button class="chart-tab" data-route="tools" onclick="navigate('tools')">Tools</button>
      </div>
    </nav>

  </div> <!-- END APP SHELL -->


  <!-- ============================================================
       TOOLS SCREEN (Aldi, Walmart, Costco, Cycle, Loadout)
       ============================================================ -->
  <template id="screen-tools">
    <div class="panel" style="margin-top:14px;">
      <div class="hdr-logo glow-faint">TOOLS</div>
      <div class="section-divider"></div>

      <button class="btn-base" style="width:100%;margin-bottom:8px;" onclick="navigate('aldi')">Aldi</button>
      <button class="btn-base" style="width:100%;margin-bottom:8px;" onclick="navigate('walmart')">Walmart</button>
      <button class="btn-base" style="width:100%;margin-bottom:8px;" onclick="navigate('costco')">Costco</button>
      <button class="btn-base" style="width:100%;margin-bottom:8px;" onclick="navigate('cycle')">Cycle</button>
      <button class="btn-base" style="width:100%;" onclick="navigate('loadout')">Loadout</button>
    </div>
  </template>


  <!-- ============================================================
       MODALS — UNIFIED V5.3 STYLE
       ============================================================ -->

  <div id="modal-backdrop" class="plate-overlay" onclick="closeModal()"></div>

  <div id="modal-meal" class="plate-modal" style="display:none;">
    <div class="hdr">
      <div class="hdr-logo">ADD MEAL</div>
      <button class="btn-base" onclick="closeModal()">✕</button>
    </div>

    <div class="section-divider"></div>

    <label class="sys-status dim">Name</label>
    <input id="meal-name" class="day-note-input" type="text" placeholder="Chicken & Rice">

    <label class="sys-status dim" style="margin-top:10px;">Calories</label>
    <input id="meal-cal" class="day-note-input" type="number" placeholder="620">
